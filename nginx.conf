user veteran;
worker_processes auto;
pid /tmp/nginx.pid;
error_log /data/logs/nginx_error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time $upstream_response_time';

    access_log /data/logs/nginx_access.log main buffer=32k flush=5s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;
    client_max_body_size 500M;
    client_body_buffer_size 128k;
    proxy_request_buffering off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/js
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/ld+json
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2
        application/wasm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=git:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=5r/s;

    # Upstream backend
    upstream backend {
        server 127.0.0.1:3000;
        keepalive 64;
    }

    server {
        listen 7860 default_server;
        listen [::]:7860 default_server;
        server_name _;

        root /app/frontend/dist;
        index index.html;

        # Health check endpoints
        location /health {
            proxy_pass http://backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
            limit_req zone=api burst=10 nodelay;
        }

        location /ready {
            proxy_pass http://backend/ready;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
            limit_req zone=api burst=10 nodelay;
        }

        location /metrics {
            proxy_pass http://backend/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
            limit_req zone=api burst=5 nodelay;
        }

        # API endpoints
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            limit_req zone=api burst=50 nodelay;
        }

        # Socket.io WebSocket support
        location /socket.io/ {
            proxy_pass http://backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
            limit_req zone=api burst=20 nodelay;
        }

        # Git Smart HTTP protocol
        location ~ ^/[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+\.git/ {
            proxy_pass http://backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            limit_req zone=git burst=20 nodelay;

            # Increase buffer for git packfiles
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;
            proxy_temp_file_write_size 64k;
        }

        # Git clone/archive URLs without .git suffix
        location ~ ^/[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+\.git$ {
            return 301 $scheme://$host$uri/;
        }

        # Static assets with far-future cache
        location /assets/ {
            root /app/frontend/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # Service worker
        location /sw.js {
            root /app/frontend/dist;
            add_header Cache-Control "no-cache";
            access_log off;
            try_files $uri =404;
        }

        # Favicon and static root files
        location = /favicon.ico {
            root /app/frontend/dist;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location = /robots.txt {
            root /app/frontend/dist;
            access_log off;
        }

        location = /manifest.json {
            root /app/frontend/dist;
            access_log off;
            expires 1d;
        }

        # SPA fallback - all other routes serve index.html
        location / {
            root /app/frontend/dist;
            try_files $uri $uri/ /index.html;

            # Don't cache index.html
            location = /index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate";
                expires off;
            }
        }

        # Error pages
        error_page 404 /index.html;
        error_page 500 502 503 504 /index.html;

        # Deny access to dotfiles
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
